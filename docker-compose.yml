services:
  postgres:
    image: postgres:16-alpine
    container_name: yonetim-paneli-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yonetim_paneli}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edge

  redis:
    image: redis:7-alpine
    container_name: yonetim-paneli-redis
    command: sh -c 'redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - edge

  backend:
    command: node dist/main.js
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Optional: if Prisma engine downloads are slow/blocked on your VPS,
        # set PRISMA_ENGINES_MIRROR in your environment or .env
        PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR:-}
    container_name: yonetim-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-yonetim_paneli}?schema=public&connection_limit=10&pool_timeout=30&connect_timeout=30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-changeme-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sendika.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme-admin-pass}
      WAHA_API_URL: http://waha:3001
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
      WAHA_WEBHOOK_URL: http://backend:3000
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      NOTIFICATION_WHATSAPP_ENABLED: ${NOTIFICATION_WHATSAPP_ENABLED:-true}
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - edge

  frontend:
    build:
      context: ./panele
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: yonetim-web
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  waha:
    image: devlikeapro/waha:latest
    container_name: yonetim-waha
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_DASHBOARD_ENABLED: "true"
      WHATSAPP_API_PORT: "3001"
      WAHA_API_KEY: ${WAHA_API_KEY:-changeme-waha-key}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-changeme}
      WHATSAPP_HOOK_URL: http://backend:3000/whatsapp/webhook
      WHATSAPP_HOOK_EVENTS: "message,message.ack,session.status"
      WHATSAPP_RESTART_ALL_SESSIONS: "true"
      WHATSAPP_START_SESSION: ${WAHA_SESSION_NAME:-default}
    volumes:
      - waha-data:/app/.sessions
    restart: unless-stopped
    networks:
      - edge

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
  waha-data:

networks:
  edge:
    external: true
